<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ogden Basic English 850 - 每日背词</title>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: rgba(22, 24, 34, 0.85);
    --card-bg-solid: #1a1c26;
    --text: #e8eaef;
    --text-secondary: #8b8fa8;
    --accent: #6c8cff;
    --accent-glow: rgba(108, 140, 255, 0.25);
    --accent-warm: #f0a040;
    --green: #40c88a;
    --green-glow: rgba(64, 200, 138, 0.2);
    --red: #f06070;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.12);
    --tag-bg: rgba(108, 140, 255, 0.12);
    --tag-text: #a0b8ff;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-sans: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-cn: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --shadow-card: 0 2px 12px rgba(0,0,0,0.25), 0 0 1px rgba(255,255,255,0.06);
    --shadow-glow: 0 0 30px var(--accent-glow);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans), var(--font-cn);
    min-height: 100vh;
    padding: 28px 36px;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(108, 140, 255, 0.07) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 80% 15%, rgba(240, 160, 64, 0.05) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 85%, rgba(64, 200, 138, 0.04) 0%, transparent 50%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    gap: 18px;
    height: calc(100vh - 56px);
    position: relative;
    z-index: 1;
    align-content: start;
  }

  /* ── Header ── */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow-card);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  .header-left h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    line-height: 1.2;
  }

  .header-left .subtitle {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .day-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--accent), #7c6cff);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 7px 18px;
    border-radius: 24px;
    box-shadow: 0 4px 20px var(--accent-glow);
    letter-spacing: 0.3px;
  }

  .date-text {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 12px;
    white-space: nowrap;
  }

  .status-badge.in-progress {
    background: rgba(240, 160, 64, 0.15);
    color: var(--accent-warm);
  }

  .status-badge.done {
    background: rgba(64, 200, 138, 0.15);
    color: var(--green);
  }

  /* ── Day Progress Dots ── */
  .day-strip {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    overflow-x: auto;
    scrollbar-width: none;
    justify-content: center;
  }

  .day-strip::-webkit-scrollbar { display: none; }

  .day-dot {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 2px solid transparent;
    flex-shrink: 0;
  }

  .day-dot.completed {
    background: rgba(64, 200, 138, 0.2);
    border-color: rgba(64, 200, 138, 0.4);
    color: var(--green);
  }

  .day-dot.completed:hover {
    background: rgba(64, 200, 138, 0.35);
    transform: scale(1.12);
  }

  .day-dot.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 14px var(--accent-glow);
    transform: scale(1.10);
  }

  .day-dot.future {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.06);
    color: var(--text-secondary);
  }

  /* ── Panels ── */
  .panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 22px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: var(--shadow-card);
    transition: border-color 0.3s ease;
  }

  .panel:hover {
    border-color: var(--border-strong);
  }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title .icon { font-size: 15px; }

  .panel-title .count {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--tag-bg);
    padding: 3px 10px;
    border-radius: 10px;
    margin-left: auto;
  }

  /* ── Word Cards ── */
  .word-cards {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .word-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 14px;
    background: rgba(255,255,255,0.025);
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: default;
    animation: cardIn 0.35s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-card:nth-child(1)  { animation-delay: 0.00s; }
  .word-card:nth-child(2)  { animation-delay: 0.02s; }
  .word-card:nth-child(3)  { animation-delay: 0.04s; }
  .word-card:nth-child(4)  { animation-delay: 0.06s; }
  .word-card:nth-child(5)  { animation-delay: 0.08s; }
  .word-card:nth-child(n+6) { animation-delay: 0.10s; }

  .word-card:hover {
    background: rgba(255,255,255,0.06);
    border-color: var(--border-strong);
    transform: translateX(3px);
  }

  .word-num {
    font-size: 10px;
    color: var(--text-secondary);
    min-width: 26px;
    font-family: var(--font-mono);
    opacity: 0.7;
  }

  .word-english {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    min-width: 95px;
    letter-spacing: -0.2px;
  }

  .word-phonetic {
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 85px;
    font-family: var(--font-mono);
    opacity: 0.8;
  }

  .word-chinese {
    font-size: 14px;
    color: var(--accent-warm);
    min-width: 70px;
    font-weight: 500;
  }

  .word-example {
    font-size: 11px;
    color: var(--text-secondary);
    flex: 1;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.75;
  }

  .word-example-zh {
    flex: 0 0 100%;
    font-size: 11px;
    line-height: 1.4;
    color: var(--text-secondary);
    opacity: 0.82;
    white-space: normal;
    word-break: break-word;
  }

  .word-tag {
    font-size: 9px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 5px;
    background: var(--tag-bg);
    color: var(--tag-text);
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-size: 14px;
    gap: 8px;
    opacity: 0.7;
  }

  .empty-state .emoji { font-size: 40px; }

  /* ── Progress Bar ── */
  .progress-bar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .progress-bar .label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .progress-bar .bar {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #60d89f);
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--green-glow);
  }

  .progress-bar .text {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    font-weight: 600;
    font-family: var(--font-mono);
  }

  /* ── Buttons ── */
  .btn-group {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 12px var(--accent-glow);
  }

  .btn.complete-btn {
    background: linear-gradient(135deg, #40c88a, #35b078);
    border-color: transparent;
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    padding: 9px 20px;
    box-shadow: 0 4px 18px var(--green-glow);
    letter-spacing: 0.4px;
    animation: pulse-btn 2.5s ease-in-out infinite;
  }

  .btn.complete-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(64, 200, 138, 0.35);
  }

  .btn.complete-btn:active {
    transform: translateY(0);
  }

  .btn.complete-btn.done-state {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    box-shadow: none;
    color: var(--text-secondary);
    animation: none;
    cursor: default;
  }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 4px 18px var(--green-glow); }
    50%      { box-shadow: 0 6px 28px rgba(64, 200, 138, 0.4); }
  }

  /* ── Scrollbar ── */
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* ── Carousel mode ── */
  .carousel-container {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    padding: 60px 40px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: var(--shadow-card);
    min-height: 420px;
    text-align: center;
  }

  .carousel-word {
    text-align: center;
    padding: 20px;
  }

  .carousel-word .eng {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: var(--text);
    background: linear-gradient(135deg, #e8eaef 0%, #b8c0d0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .carousel-word .phon {
    font-size: 20px;
    color: var(--text-secondary);
    margin-top: 10px;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }

  .carousel-word .chn {
    font-size: 32px;
    color: var(--accent-warm);
    margin-top: 10px;
    font-weight: 700;
  }

  .carousel-word .ex {
    font-size: 17px;
    color: var(--text-secondary);
    margin-top: 14px;
    font-style: italic;
    opacity: 0.85;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .carousel-word .ex-zh {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 8px;
    opacity: 0.82;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.5;
    word-break: break-word;
  }

  .carousel-word .cat {
    font-size: 11px;
    color: var(--tag-text);
    background: var(--tag-bg);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 12px;
    margin-top: 16px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .carousel-word .idx {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 12px;
    font-family: var(--font-mono);
    opacity: 0.6;
  }

  .hidden { display: none !important; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    background: var(--card-bg-solid);
    border: 1px solid var(--border-strong);
    border-radius: 30px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 100;
    animation: toastIn 0.4s ease, toastOut 0.3s ease 1.8s forwards;
    letter-spacing: 0.3px;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-16px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  @keyframes toastOut {
    from { opacity: 1; }
    to   { opacity: 0; transform: translateX(-50%) translateY(-8px); }
  }

  /* ── Responsive: Tablet ── */
  @media (max-width: 900px) {
    html, body { overflow-x: hidden; }
    body { padding: 12px; }
    .container {
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      height: auto;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }
    .container > * { min-width: 0; }
    .header { flex-wrap: wrap; gap: 8px; }
    .header-right { flex-wrap: wrap; gap: 8px; justify-content: center; }
    .day-strip { flex-wrap: wrap; gap: 4px; justify-content: center; }
    .carousel-container { padding: 28px 14px; min-height: auto; }
    .carousel-word .eng { font-size: 40px; }
    .carousel-word .chn { font-size: 20px; }
    .carousel-word .ex, .carousel-word .ex-zh { max-width: 100%; }
    .progress-bar { padding: 8px 12px; }
    /* Word cards: allow wrapping, kill forced widths */
    .word-card { flex-wrap: wrap; gap: 4px 6px; padding: 9px 10px; min-width: 0; }
    .word-num { min-width: auto; }
    .word-english { min-width: auto; }
    .word-phonetic { min-width: auto; }
    .word-chinese { min-width: auto; }
    .word-example { flex-basis: 100%; white-space: normal; overflow: visible; text-overflow: unset; word-break: break-word; }
    .word-example-zh { flex: 0 0 100%; white-space: normal; word-break: break-word; }
    .word-tag { white-space: nowrap; }
    .panel { min-width: 0; overflow: hidden; }
    .word-cards { min-width: 0; }
  }

  /* ── Responsive: Mobile ── */
  @media (max-width: 480px) {
    html, body { overflow-x: hidden; }
    body { padding: 6px; }
    .container {
      gap: 8px;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }
    .container > * { min-width: 0; max-width: 100%; }
    /* Header: stack vertically */
    .header {
      padding: 10px 12px;
      flex-direction: column;
      align-items: stretch;
      min-width: 0;
    }
    .header-left { justify-content: center; flex-wrap: wrap; }
    .header-left h1 { font-size: 15px; }
    .header-left .subtitle { font-size: 11px; }
    .header-logo { width: 34px; height: 34px; font-size: 18px; flex-shrink: 0; }
    .header-right { flex-wrap: wrap; gap: 5px; justify-content: center; min-width: 0; }
    .header-right .day-badge { font-size: 11px; padding: 4px 10px; }
    .header-right .status-badge { font-size: 10px; padding: 3px 8px; }
    .header-right .btn { font-size: 10px; padding: 5px 8px; }
    .header-right .btn.complete-btn { font-size: 10px; padding: 6px 12px; }
    .header .btn-group { gap: 3px; }
    .btn-group .btn { padding: 5px 8px; font-size: 10px; }
    /* Day strip: compact dots */
    .day-strip { gap: 2px; justify-content: center; flex-wrap: wrap; min-width: 0; }
    .day-dot { width: 20px; height: 20px; font-size: 8px; border-radius: 4px; }
    /* Progress bar */
    .progress-bar { padding: 6px 8px; gap: 6px; min-width: 0; }
    .progress-bar .label { font-size: 9px; white-space: nowrap; }
    .progress-bar .text { font-size: 9px; white-space: nowrap; }
    .progress-bar .bar { min-width: 20px; }
    /* Panels: tighter padding, prevent overflow */
    .panel {
      padding: 10px 8px;
      border-radius: var(--radius-md);
      min-width: 0;
      overflow: hidden;
    }
    .panel-title { font-size: 10px; margin-bottom: 6px; padding-bottom: 6px; gap: 4px; }
    .panel-title .count { font-size: 9px; padding: 2px 7px; }
    /* Word cards: 2-line stacked layout */
    .word-cards { min-width: 0; gap: 4px; }
    .word-card {
      flex-wrap: wrap;
      gap: 1px 5px;
      padding: 7px 8px;
      min-width: 0;
      animation: none;
    }
    .word-num { min-width: auto; font-size: 9px; order: 0; }
    .word-english { min-width: auto; font-size: 14px; font-weight: 600; order: 1; }
    .word-phonetic { min-width: auto; font-size: 10px; order: 2; }
    .word-chinese { min-width: auto; font-size: 12px; font-weight: 500; order: 3; }
    .word-tag { font-size: 8px; padding: 1px 5px; white-space: nowrap; order: 4; }
    .word-example {
      flex-basis: 100%;
      font-size: 10px;
      white-space: normal !important;
      overflow: visible !important;
      text-overflow: unset !important;
      max-width: 100%;
      word-break: break-word;
      order: 5;
    }
    .word-example-zh {
      flex: 0 0 100%;
      font-size: 10px;
      max-width: 100%;
      order: 6;
    }
    .word-card:hover { transform: none; }
    /* Carousel: fit screen */
    .carousel-container {
      padding: 20px 8px;
      min-height: auto;
      gap: 12px;
      border-radius: var(--radius-md);
      min-width: 0;
    }
    .carousel-word { padding: 12px 4px; min-width: 0; }
    .carousel-word .eng { font-size: 30px; letter-spacing: -0.5px; }
    .carousel-word .phon { font-size: 13px; margin-top: 4px; }
    .carousel-word .chn { font-size: 17px; margin-top: 4px; }
    .carousel-word .ex { font-size: 11px; margin-top: 6px; max-width: 100%; word-break: break-word; }

  }

  function markDayComplete(dayNum) {
    const completed = getCompletedDays();
    completed.add(dayNum);
    saveCompletedDays(completed);
    return completed;
  }

  function unmarkDayComplete(dayNum) {
    const completed = getCompletedDays();
    completed.delete(dayNum);
    saveCompletedDays(completed);
    return completed;
  }

  // Returns the first uncompleted day ≤ calendarDay, or calendarDay if all done
  function getActiveStudyDay() {
    const calendarDay = getStudyDay();
    if (calendarDay < 1) return -1;
    const completed = getCompletedDays();
    for (let d = 1; d <= calendarDay; d++) {
      if (!completed.has(d)) return d;
    }
    return calendarDay; // today's content is the furthest available
  }

  // ── Toast ──
  function showToast(message, emoji) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = `${emoji||'✅'} ${message}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  // ── Day strip dots ──
  function renderDayStrip() {
    const calendarDay = getStudyDay();
    const activeDay = getActiveStudyDay();
    const completed = getCompletedDays();
    const strip = document.getElementById('dayStrip');
    if (calendarDay < 1) { strip.innerHTML = ''; return; }
    let html = '';
    for (let d = 1; d <= TOTAL_DAYS; d++) {
      const isComp = completed.has(d) || d < activeDay;
      let cls = isComp ? 'completed' : (d === activeDay ? 'active' : 'future');
      if (d > calendarDay && !completed.has(d)) cls = 'future';
      const clickAction = (isComp && d <= calendarDay) ? `onclick="rollbackDay(${d})"` : '';
      const title = `Day ${d}${isComp ? ' ✓ 点击撤销' : (d === activeDay ? ' 当前' : '')}`;
      html += `<div class="day-dot ${cls}" ${clickAction} title="${title}">${d}</div>`;
    }
    strip.innerHTML = html;
  }

  // ── Rollback a completed day ──
  function rollbackDay(dayNum) {
    const calendarDay = getStudyDay();
    if (dayNum > calendarDay) return;
    const completed = getCompletedDays();
    if (!completed.has(dayNum)) return;
    unmarkDayComplete(dayNum);
    showToast(`Day ${dayNum} 已撤销，可以重新学习`, '↩️');
    renderAll();
  }

  // ── Confirm today complete ──
  function confirmTodayComplete() {
    const calendarDay = getStudyDay();
    const activeDay = getActiveStudyDay();

    if (calendarDay < 1) { showToast('学习计划尚未开始', '⏳'); return; }
    if (activeDay > TOTAL_DAYS) { showToast('太厉害了！全部学完了！', '🏆'); return; }

    const completed = getCompletedDays();

    // If already completed, offer rollback
    if (completed.has(activeDay)) {
      if (activeDay > calendarDay) {
        showToast(`Day ${activeDay} 已完成，明天继续~`, '😊');
        return;
      }
      unmarkDayComplete(activeDay);
      showToast(`Day ${activeDay} 已撤销，可以重新学习`, '↩️');
      renderAll();
      return;
    }

    // Prevent completing future days
    if (activeDay > calendarDay) { showToast('今天没有更多任务了，明天再来吧~', '😊'); return; }

    markDayComplete(activeDay);
    showToast(`Day ${activeDay} 完成！继续加油！`, '🌟');
    renderAll();
  }

  // ── Plan / words helpers ──
  function getPlanForDay(dayNum) {
    return PLAN.find(p => p.day === dayNum);
  }

  function parseRange(rangeStr) {
    if (!rangeStr) return [];
    const parts = rangeStr.split('；');
    let indices = [];
    for (const part of parts) {
      const match = part.match(/(\d+)-(\d+)/);
      if (match) {
        const start = parseInt(match[1]);
        const end = parseInt(match[2]);
        for (let i = start; i <= end; i++) indices.push(i);
      }
    }
    return indices;
  }

  function parseReviewRange(rangeStr) {
    if (!rangeStr || rangeStr.includes('无')) return [];
    const days = [];
    const matches = rangeStr.matchAll(/第(\d+)天/g);
    for (const m of matches) days.push(parseInt(m[1]));
    return days;
  }

  function getWordsByDay(dayNum) {
    const planDay = getPlanForDay(dayNum);
    if (!planDay) return [];
    const indices = parseRange(planDay.new_range);
    return indices.map(i => WORDS[i-1]).filter(Boolean);
  }

  function getReviewWords(dayNum) {
    const planDay = getPlanForDay(dayNum);
    if (!planDay) return [];
    const reviewDays = parseReviewRange(planDay.review_range);
    let allWords = [];
    for (const d of reviewDays) {
      allWords = allWords.concat(getWordsByDay(d));
    }
    return allWords;
  }

  function createWordCard(word, index) {
    return `
      <div class="word-card">
        <span class="word-num">#${word['学习顺序']}</span>
        <span class="word-english">${word['单词']}</span>
        <span class="word-phonetic">${word['音标']}</span>
        <span class="word-chinese">${word['中文翻译']}</span>
        <span class="word-example" title="${(word['使用例句']||'').replace(/"/g, '&quot;')}">${word['使用例句']||''}</span>
        <span class="word-tag">${word['记忆组']||''}</span>
        <span class="word-example-zh">${word['例句理解']||''}</span>
      </div>`;
  }

  // ── Master render ──
  function renderAll() {
    renderListMode();
    renderDayStrip();
  }

  function renderListMode() {
    const calendarDay = getStudyDay();
    const dayNum = getActiveStudyDay();
    const completed = getCompletedDays();

    const dateStr = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'});

    // Before start date
    if (calendarDay < 1) {
      document.getElementById('newWordsList').innerHTML = '<div class="empty-state"><span class="emoji">⏳</span>学习计划尚未开始</div>';
      document.getElementById('reviewWordsList').innerHTML = '';
      document.getElementById('newCount').textContent = '0';
      document.getElementById('reviewCount').textContent = '0';
      document.getElementById('dayBadge').textContent = '未开始';
      document.getElementById('dateText').textContent = dateStr;
      document.getElementById('subtitle').textContent = '计划开始日期: 2026年6月11日';
      document.getElementById('statusBadge').textContent = '⏳ 未开始';
      document.getElementById('statusBadge').className = 'status-badge in-progress';
      document.getElementById('btnComplete').textContent = '⏳ 尚未开始';
      document.getElementById('btnComplete').className = 'btn complete-btn done-state';
      return;
    }

    // All done
    if (dayNum > TOTAL_DAYS || (dayNum === TOTAL_DAYS && completed.has(TOTAL_DAYS) && calendarDay >= TOTAL_DAYS)) {
      document.getElementById('newWordsList').innerHTML = '<div class="empty-state"><span class="emoji">🏆</span>全部 850 词学习完毕！</div>';
      document.getElementById('reviewWordsList').innerHTML = '<div class="empty-state"><span class="emoji">🎉</span>恭喜完成 Ogden Basic English！</div>';
      document.getElementById('newCount').textContent = '0';
      document.getElementById('reviewCount').textContent = '0';
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressText').textContent = '850/850 (100%)';
      document.getElementById('dayBadge').textContent = '🎓 完成';
      document.getElementById('dateText').textContent = dateStr;
      document.getElementById('subtitle').textContent = '你已掌握全部 850 个基础英语单词';
      document.getElementById('statusBadge').textContent = '🏆 全部完成';
      document.getElementById('statusBadge').className = 'status-badge done';
      document.getElementById('btnComplete').textContent = '🏆 全部完成';
      document.getElementById('btnComplete').className = 'btn complete-btn done-state';
      carouselWords = [];
      carouselIndex = 0;
      renderCarouselWord();
      return;
    }

    const newWords = getWordsByDay(dayNum);
    const reviewWords = getReviewWords(dayNum);
    const planDay = getPlanForDay(dayNum);
    const isTodayDone = completed.has(dayNum);

    // New words
    const newList = document.getElementById('newWordsList');
    const newEmpty = document.getElementById('newEmpty');
    if (newWords.length === 0) {
      newList.innerHTML = '';
      newEmpty.style.display = 'flex';
    } else {
      newEmpty.style.display = 'none';
      newList.innerHTML = newWords.map((w, i) => createWordCard(w, i)).join('');
    }
    document.getElementById('newCount').textContent = newWords.length;

    // Review words
    const reviewList = document.getElementById('reviewWordsList');
    const reviewEmpty = document.getElementById('reviewEmpty');
    if (reviewWords.length === 0) {
      reviewList.innerHTML = '';
      reviewEmpty.style.display = 'flex';
    } else {
      reviewEmpty.style.display = 'none';
      const display = reviewWords.slice(0, 75);
      reviewList.innerHTML = display.map((w, i) => createWordCard(w, i)).join('');
      if (reviewWords.length > 75) {
        reviewList.innerHTML += `<div class="word-card" style="justify-content:center;color:var(--text-secondary);font-size:13px;">... 还有 ${reviewWords.length - 75} 个复习词</div>`;
      }
    }
    document.getElementById('reviewCount').textContent = reviewWords.length;

    // Progress
    const learnedUpTo = dayNum * 25;
    const learned = Math.min(learnedUpTo, 850);
    const pct = Math.round(learned / 850 * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${learned}/850 (${pct}%)`;

    // Header
    document.getElementById('dayBadge').textContent = `Day ${dayNum}`;
    document.getElementById('dateText').textContent = dateStr;
    if (planDay) {
      document.getElementById('subtitle').textContent = `新学: ${planDay.new_range} | 复习: ${planDay.review_range}`;
    }

    // Status
    if (isTodayDone) {
      document.getElementById('statusBadge').textContent = '✅ 已完成';
      document.getElementById('statusBadge').className = 'status-badge done';
      document.getElementById('btnComplete').textContent = '✅ 已完成';
      document.getElementById('btnComplete').className = 'btn complete-btn done-state';
    } else {
      document.getElementById('statusBadge').textContent = '📝 待完成';
      document.getElementById('statusBadge').className = 'status-badge in-progress';
      document.getElementById('btnComplete').textContent = '✅ 今日完成';
      document.getElementById('btnComplete').className = 'btn complete-btn';
    }

    // Carousel data
    carouselWords = [...newWords, ...reviewWords.slice(0, 50)];
    carouselIndex = 0;
    renderCarouselWord();
  }

  function renderCarouselWord() {
    if (carouselWords.length === 0) return;
    const w = carouselWords[carouselIndex];
    document.getElementById('carouselWord').innerHTML = `
      <div class="eng">${w['单词']}</div>
      <div class="phon">${w['音标']}</div>
      <div class="chn">${w['中文翻译']}</div>
      <div class="ex">${w['使用例句']||''}</div>
      <div class="ex-zh">${w['例句理解']||''}</div>
      <div class="cat">${w['记忆组']||''}</div>
      <div class="idx">${carouselIndex + 1} / ${carouselWords.length}</div>
    `;
  }

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('listMode').classList.toggle('hidden', mode !== 'list');
    document.getElementById('carouselMode').classList.toggle('hidden', mode !== 'carousel');
    document.getElementById('btnList').classList.toggle('active', mode === 'list');
    document.getElementById('btnCarousel').classList.toggle('active', mode === 'carousel');
    if (mode === 'carousel') renderCarouselWord();
    if (mode === 'list') stopAutoPlay();
  }

  function nextWord() {
    if (carouselWords.length === 0) return;
    carouselIndex = (carouselIndex + 1) % carouselWords.length;
    renderCarouselWord();
  }

  function prevWord() {
    if (carouselWords.length === 0) return;
    carouselIndex = (carouselIndex - 1 + carouselWords.length) % carouselWords.length;
    renderCarouselWord();
  }

  function toggleAutoPlay() {
    if (autoPlay) {
      stopAutoPlay();
    } else {
      startAutoPlay();
    }
  }

  function startAutoPlay() {
    autoPlay = true;
    document.getElementById('btnAutoPlay').textContent = '⏸ 暂停';
    autoPlayTimer = setInterval(nextWord, 4000);
  }

  function stopAutoPlay() {
    autoPlay = false;
    document.getElementById('btnAutoPlay').textContent = '▶ 自动播放';
    if (autoPlayTimer) clearInterval(autoPlayTimer);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (currentMode === 'carousel') {
      if (e.key === 'ArrowRight') nextWord();
      if (e.key === 'ArrowLeft') prevWord();
      if (e.key === ' ') { e.preventDefault(); toggleAutoPlay(); }
    }
  });

  // Initialize
  renderAll();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
